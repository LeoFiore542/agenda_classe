<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aGenda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='logo.png') }}">
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <main class="login-shell">
        <section class="panel login-panel">
            <div class="login-copy">
                <p class="eyebrow">Classe 4G</p>
                <h1>Accesso personale</h1>
                <p class="hero-copy">
                    Ogni persona dell'elenco classe ha un account personale generato automaticamente.
                    Username e password iniziale coincidono con lo username.
                </p>
                <p class="login-hint">
                    Esempio: <strong>abbruzzese.elisa</strong>
                </p>
            </div>

            <form class="event-form simple-form" method="post" action="{{ url_for('login') }}">
                <input type="hidden" name="next" value="{{ next_url }}">

                <label>
                    Username
                    <input type="text" name="username" placeholder="cognome.nome" autocomplete="username" required>
                </label>

                <label>
                    Password
                    <div class="password-input-wrap">
                        <input type="password" name="password" placeholder="Inserisci la password" autocomplete="current-password" required data-password-field>
                        <button type="button" class="ghost-button password-toggle" data-password-toggle>Mostra</button>
                    </div>
                </label>

                {% if error_message %}
                <p class="form-feedback login-error">{{ error_message }}</p>
                {% endif %}

                <button class="primary-button" type="submit">Entra</button>
            </form>
        </section>
    </main>
    <script src="{{ url_for('static', filename='password-toggle.js') }}" defer></script>
</body>
</html>
